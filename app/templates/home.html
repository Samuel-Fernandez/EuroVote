{% extends 'base.html' %}

{% block content %}
    <div class="user-welcome">
        <h2 class="page-title">Welcome, {{ user_name }}</h2>
        <a href="{{ url_for('main.logout') }}" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>

    <div class="dashboard-section">
        <h3 class="section-title">Select an action</h3>

        {% if user_id == 1 %}
        <form id="set_country_form">
            <div class="select-wrapper">
                <select id="country_select" name="country">
                    {% for country in countries %}
                        <option value="{{ country.id }}" {% if current_voting_country and country.id == current_voting_country.id %}selected{% endif %}>{{ country.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit">
                <i class="fas fa-globe-europe"></i> Set Voting Country
            </button>
        </form>        
        {% endif %}

        <div class="profiles-container" id="profiles-container" style="display: flex; justify-content: center;">
            <div class="profile-card" style="width: 100%; max-width: 400px;">
                <a href="{{ url_for('main.vote', country_id=current_voting_country.id) if current_voting_country else '#' }}" id="vote-card">
                    {% if current_voting_country %}
                        <h3>Voter pour {{ current_voting_country.name }}</h3>
                        <!-- Retirer le conteneur autour de l'image et afficher directement l'image -->
                        <img src="{{ url_for('static', filename='countries_flag/' ~ current_voting_country.id ~ '.png') }}" alt="{{ current_voting_country.name }}">
                    {% else %}
                        <h3>Aucun vote en cours</h3>
                    {% endif %}
                </a>
            </div>
        </div>

        <div class="histogram-section" style="margin-top: 40px;">
            <h3 class="section-title" style="text-align: center; color: var(--text-main); font-size: 24px; margin-bottom: 20px;">
                <i class="fas fa-chart-bar" style="color: var(--primary-color);"></i> Classement en Direct
            </h3>
            <div class="live-histogram" id="live-histogram">
                <!-- Les barres seront générées ici par JS -->
            </div>
        </div>
    </div>

    <div id="notifications-container"></div>

    <script>
        let currentCountryId = {{ current_voting_country.id if current_voting_country else 'null' }};
        let currentCountryName = "{{ current_voting_country.name if current_voting_country else '' }}";
    
        const notificationSound = new Audio("{{ url_for('static', filename='notification.mp3') }}");
    
        function showNotification(message, type = 'success') {
            const notif = document.createElement("div");
            notif.textContent = message;
            notif.className = `notification ${type}`;
            
            if (type === 'success') notif.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            else if (type === 'error') notif.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
            else if (type === 'warning') notif.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
    
            const container = document.getElementById('notifications-container');
            container.appendChild(notif);
    
            setTimeout(() => {
                notif.style.opacity = '0';
                notif.style.transform = 'translateX(100%)';
                setTimeout(() => notif.remove(), 500);
            }, 3000);
        }
    
        async function updateVoteCard(countryData) {
            const voteCard = document.getElementById("vote-card");
    
            if (!countryData) {
                voteCard.innerHTML = "<h3>No country currently being voted</h3>";
                voteCard.href = "#";
                return;
            }
    
            voteCard.innerHTML = `
                <h3>Vote for ${countryData.name}</h3>
                <img src="/static/countries_flag/${countryData.id}.png" alt="${countryData.name}">
            `;
            voteCard.href = `/vote/${countryData.id}`;
        }
    
        async function checkForUpdates() {
            try {
                const res = await fetch("{{ url_for('main.get_current_country') }}");
                if (!res.ok) throw new Error("Network error");
    
                const data = await res.json();
    
                if (!data || data.country_id === undefined) {
                    if (currentCountryId !== null) {
                        currentCountryId = null;
                        currentCountryName = "";
                        await updateVoteCard(null);
                    }
                    return;
                }
    
                if (data.country_id !== currentCountryId) {
                    const oldName = currentCountryName;
                    currentCountryId = data.country_id;
                    currentCountryName = data.country_name;
                    await updateVoteCard({ id: data.country_id, name: data.country_name });
    
                    if (oldName) {
                        showNotification(`Voting changed from ${oldName} to ${data.country_name}`, 'warning');
                    } else {
                        showNotification(`Voting country set to ${data.country_name}`, 'success');
                    }
    
                    notificationSound.play().catch(err => {
                        console.warn("Could not play sound:", err);
                    });
                }
            } catch (err) {
                console.error("Update check error:", err);
            }
        }
    
        window.addEventListener('load', () => {
            // Check for vote_success parameter
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('vote_success') === '1') {
                showNotification('Votre vote a bien été pris en compte !', 'success');
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const form = document.getElementById('set_country_form');
            const select = document.getElementById('country_select');
    
            if (form && select) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
    
                    fetch("{{ url_for('main.set_voting_country_route') }}", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ country_id: parseInt(select.value) })
                    })
                    .then(res => res.ok ? res.json() : Promise.reject("Server error"))
                    .then(data => {
                        if (data.success) {
                            showNotification(`Voting country set to ${data.country_name}`);
                            updateVoteCard({ id: data.country_id, name: data.country_name });
                            notificationSound.play().catch(err => console.warn("Sound error:", err));
                            currentCountryId = data.country_id;
                            currentCountryName = data.country_name;
                        } else {
                            showNotification("Error setting country", "error");
                        }
                    })
                    .catch(err => {
                        console.error("AJAX error:", err);
                        showNotification("Connection error", "error");
                    });
                });
            }
    
            // FLIP animation logic and histogram fetch
            async function fetchHistogram() {
                try {
                    const res = await fetch('/api/results');
                    if (!res.ok) return;
                    const data = await res.json();
                    
                    const container = document.getElementById('live-histogram');
                    
                    // FLIP: 1. FIRST (Record current positions)
                    const bars = Array.from(container.children);
                    const firstPositions = {};
                    bars.forEach(bar => {
                        const id = bar.dataset.id;
                        firstPositions[id] = bar.getBoundingClientRect();
                    });
                    
                    // Update DOM elements & height
                    data.forEach((country, index) => {
                        let bar = document.getElementById(`bar-${country.country_id}`);
                        if (!bar) {
                            bar = document.createElement('div');
                            bar.id = `bar-${country.country_id}`;
                            bar.dataset.id = country.country_id;
                            bar.className = 'histogram-bar-container';
                            bar.innerHTML = `
                                <div class="bar-score">${country.score.toFixed(1)} pts</div>
                                <div class="bar-track">
                                    <div class="bar-fill"></div>
                                </div>
                                <img class="bar-flag" src="/static/countries_flag/${country.country_id}.png" alt="${country.country_name}">
                                <div class="bar-name">${country.country_name}</div>
                                <div class="bar-rank"></div>
                            `;
                            container.appendChild(bar);
                            
                            // Add click listener on flag for details
                            const flagImg = bar.querySelector('.bar-flag');
                            flagImg.style.cursor = 'pointer';
                            flagImg.addEventListener('click', () => {
                                const details = JSON.parse(bar.dataset.details || '[]');
                                showVoteDetails(details, bar.dataset.countryName);
                            });
                        }
                        
                        // Update latest details data on element
                        bar.dataset.details = JSON.stringify(country.details || []);
                        bar.dataset.countryName = country.country_name;
                        
                        // Update content if changed
                        bar.querySelector('.bar-score').textContent = country.score.toFixed(1) + ' pts';
                        
                        // Update height (Max score is dynamic based on top country)
                        const maxScore = Math.max(12, data.length > 0 ? data[0].score : 12);
                        const heightPercent = Math.max(2, (country.score / maxScore) * 100);
                        bar.querySelector('.bar-fill').style.height = `${heightPercent}%`;
                        
                        // Change DOM order based on index
                        bar.style.order = index;

                        // Update rank display
                        const rank = index + 1;
                        const rankDiv = bar.querySelector('.bar-rank');
                        rankDiv.textContent = rank;
                        
                        // Apply styling for top 3
                        rankDiv.className = 'bar-rank'; // reset
                        if (rank === 1) rankDiv.classList.add('rank-gold');
                        else if (rank === 2) rankDiv.classList.add('rank-silver');
                        else if (rank === 3) rankDiv.classList.add('rank-bronze');
                        else rankDiv.classList.add('rank-normal');
                    });
                    
                    // FLIP: 2. LAST (Record new positions after DOM update)
                    requestAnimationFrame(() => {
                        const lastPositions = {};
                        const currentBars = Array.from(container.children);
                        currentBars.forEach(bar => {
                            lastPositions[bar.dataset.id] = bar.getBoundingClientRect();
                        });
                        
                        // FLIP: 3. INVERT and 4. PLAY
                        currentBars.forEach(bar => {
                            const id = bar.dataset.id;
                            const first = firstPositions[id];
                            const last = lastPositions[id];
                            
                            if (first && last) {
                                const deltaX = first.left - last.left;
                                // Only animate if position changed
                                if (deltaX !== 0) {
                                    // Invert
                                    bar.style.transform = `translateX(${deltaX}px)`;
                                    bar.style.transition = 'transform 0s';
                                    
                                    // Play
                                    requestAnimationFrame(() => {
                                        bar.style.transform = '';
                                        bar.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
                                    });
                                }
                            }
                        });
                    });
                    
                } catch (err) {
                    console.error('Error fetching histogram:', err);
                }
            }

            // Initial fetch
            fetchHistogram();

            // Start polling
            setInterval(() => {
                checkForUpdates();
                fetchHistogram();
            }, 3000);
        });
    </script>
{% endblock %}
