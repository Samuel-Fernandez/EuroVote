{% extends 'base.html' %}

{% block content %}
    <div class="vote-container">
        <h2 class="page-title">Vote pour le pays</h2>

        <div class="country-info">
            <div class="country-flag-container">
                <img src="{{ url_for('static', filename='countries_flag/' ~ country_id ~ '.png') }}"
                    alt="Drapeau du pays" class="vote-country-flag">
                <h3 class="country-name">{{ country_name }}</h3>
            </div>
        </div>

        {% if vote %}
            <div class="vote-result">
                <div class="vote-score-container" style="text-align: center; margin-top: 20px;">
                    <span class="vote-score" style="font-size: 36px; font-weight: bold; color: var(--primary-color);">{{ vote.vote }}</span>
                    <span class="vote-max" style="font-size: 24px; color: var(--text-muted);">/20</span>
                </div>
                <p class="vote-status" style="text-align: center; margin-top: 10px; color: var(--success-color);">Vous avez déjà voté</p>
            </div>
        {% else %}
            <div class="vote-control">
                <div class="slider-container">
                    <input type="range" id="vote_slider" min="1" max="20" value="10">
                    <span id="slider_value">10</span>
                </div>
                

                <button id="vote_button">
                    <i class="fas fa-check"></i> Valider le vote
                </button>

                <p class="vote-warning" style="margin-top: 15px; font-size: 14px; color: var(--warning-color);">
                    <i class="fas fa-exclamation-triangle"></i>
                    Votre vote est définitif !
                </p>
            </div>
        {% endif %}
    </div>

    {% if not vote %}
    <script>
        const slider = document.getElementById('vote_slider');
        const sliderValue = document.getElementById('slider_value');

        slider.oninput = function() {
            sliderValue.textContent = this.value;
            
            // Animate value change
            sliderValue.style.transform = 'scale(1.2)';
            setTimeout(() => {
                sliderValue.style.transform = 'scale(1)';
            }, 200);
        };

        document.getElementById('vote_button').addEventListener('click', function() {
            // Confirm before submitting
            if (confirm('Êtes-vous sûr ? Votre vote est définitif.')) {
                const voteValue = slider.value;
                
                // Show loading state
                this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';
                this.disabled = true;
                
                fetch("{{ url_for('main.submit_vote', country_id=country_id) }}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ vote: voteValue })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/?vote_success=1';
                    } else {
                        alert("Vous avez déjà voté.");
                        window.location.href = '/';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("Erreur lors de l'envoi du vote");
                    
                    // Reset button
                    this.innerHTML = '<i class="fas fa-check"></i> Valider le vote';
                    this.disabled = false;
                });
            }
        });
    </script>
    {% endif %}
{% endblock %}
